name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - test
      - acceptance
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Secrets.plist
        run: |
          cat > ios/urbanghosthunters/Secrets.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>SUPABASE_URL</key>
            <string>${{ secrets.SUPABASE_URL }}</string>
            <key>SUPABASE_ANON_KEY</key>
            <string>${{ secrets.SUPABASE_ANON_KEY }}</string>
          </dict>
          </plist>
          PLIST

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('ios/**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Build
        run: |
          xcodebuild build \
            -project ios/urbanghosthunters.xcodeproj \
            -scheme urbanghosthunters \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Test
        run: |
          xcodebuild test \
            -project ios/urbanghosthunters.xcodeproj \
            -scheme urbanghosthunters \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
